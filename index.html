<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simply Transport Solutions — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0B1F3A;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(40,153,213,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(215,29,40,0.12) 0%, transparent 50%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #162E4A;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 52px 44px 44px;
    width: 420px;
    box-shadow: 0 32px 64px rgba(0,0,0,0.45);
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 44px;
    height: 44px;
    background: #D71D28;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #FBCE07;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #FBCE07;
    line-height: 1.1;
  }
  .logo-sub {
    font-size: 11px;
    color: #6B7A8D;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: #FFFFFF;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #6B7A8D;
    margin-bottom: 36px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #6B7A8D;
    margin-bottom: 7px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 9px;
    padding: 13px 15px;
    color: #fff;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 20px;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus { border-color: #2899D5; }
  input::placeholder { color: rgba(255,255,255,0.2); }

  .btn {
    width: 100%;
    background: #2899D5;
    color: white;
    border: none;
    border-radius: 9px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: filter 0.2s, transform 0.1s;
    margin-top: 4px;
  }
  .btn:hover { filter: brightness(1.1); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .error {
    background: rgba(215,29,40,0.12);
    border: 1px solid rgba(215,29,40,0.3);
    border-radius: 8px;
    color: #f87171;
    font-size: 13px;
    padding: 11px 14px;
    margin-bottom: 20px;
    display: none;
  }

  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: rgba(107,122,141,0.6);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">STS</div>
    <div>
      <div class="logo-text">Simply Transport</div>
      <div class="logo-sub">Solutions Portal</div>
    </div>
  </div>

  <h1>Welcome Back</h1>
  <p class="subtitle">Sign in to access your portal</p>

  <div class="error" id="err"></div>

  <label>Email Address</label>
  <input type="email" id="email" placeholder="you@company.com.au" onkeydown="if(event.key==='Enter')doLogin()" />

  <label>Password</label>
  <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />

  <button class="btn" id="btn" onclick="doLogin()">Sign In →</button>

  <div class="footer">Simply Transport Solutions &nbsp;·&nbsp; &copy; 2025</div>
</div>

<script>
  const SUPABASE_URL  = 'https://feibvcvjgknrwtejoywd.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlaWJ2Y3ZqZ2tucnd0ZWpveXdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Njk5MzksImV4cCI6MjA4ODM0NTkzOX0.RMjFrw8mMPr-KcYafGZPDp-UoZiAlHGnGOZj4wwHWOk';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // If already logged in, skip straight to dashboard
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.replace('/STS-Admin-Dashboard');
  });

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('pw').value;
    const err   = document.getElementById('err');
    const btn   = document.getElementById('btn');
    err.style.display = 'none';

    if (!email || !pw) {
      err.textContent = 'Please enter your email and password.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

    if (error) {
      err.textContent = error.message === 'Invalid login credentials'
        ? 'Incorrect email or password. Please try again.'
        : error.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In →';
      return;
    }

    // Check role exists
    const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
    if (!profile || !['admin','user'].includes(profile.role)) {
      await sb.auth.signOut();
      err.textContent = 'Your account does not have access to this portal.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In →';
      return;
    }

    window.location.replace('/STS-Admin-Dashboard');
  }
</script>
</body>
</html>
